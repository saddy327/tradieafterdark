kind = "web"
previewPath = "/"
title = "TradieAfterDark"
version = "1.0.0"
id = "artifacts/tradie-after-dark"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24655

[services.development]
run = "pnpm --filter @workspace/tradie-after-dark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradie-after-dark", "run", "build" ]
publicDir = "artifacts/tradie-after-dark/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24655"
BASE_PATH = "/"
